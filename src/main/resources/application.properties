spring.application.name=weather-api-exam

# OpenWeatherMap configuration
openweathermap.api-key=${OPENWEATHERMAP_API_KEY}
openweathermap.base-url=https://api.openweathermap.org
openweathermap.units=metric

# RestTemplate / HTTP client timeout (ms)
openweathermap.connect-timeout=5000
openweathermap.read-timeout=10000

